<div class="scene page page-reset">
  <div class="fp-wrap card">
    <div class="fp-head">
      <div class="brand">
        <span class="logo">✦</span>
        <span class="brand-text">reset access</span>
      </div>

      <h1 class="fp-title">Reset Password</h1>
      <p class="fp-sub muted">
        Create a new password for your account ✨
      </p>
    </div>

    <form class="fp-form" (ngSubmit)="submit()">
      <div class="field">
        <label class="label">New password</label>
        <input
          class="input"
          type="password"
          name="newPassword"
          placeholder="At least 6 characters"
          [(ngModel)]="newPassword"
          [disabled]="loading"
          autocomplete="new-password"
          required
        />
      </div>

      <button class="btn btn-primary w100" [disabled]="loading">
        <span class="btn-glow"></span>
        {{ loading ? 'Updating…' : 'Update password' }}
      </button>

      <p class="err" *ngIf="error">{{ error }}</p>
      <p class="ok" *ngIf="ok">{{ ok }}</p>

      <div class="fp-links">
        <a class="link" routerLink="/auth">Back to login</a>
      </div>
    </form>

    <div class="fp-foot muted">
      Tip: Make sure you opened the reset link from your email.
    </div>
  </div>

  <div class="sparkles" aria-hidden="true">
    <span></span><span></span><span></span><span></span>
  </div>
</div>
